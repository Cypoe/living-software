name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: sqlite3, mbstring, curl, sodium
          coverage: none

      - name: Run kernel tests
        run: php tests/kernel_test.php

      - name: Run protocol tests
        run: php tests/protocol_test.php

      - name: Run loop tests
        run: php tests/loop_test.php
